name: IDX Stock Screener - Breakout 20 Days

on:
  schedule:
    - cron: "0 3 * * 1-5" # 10:00 Jakarta, Mon-Fri
    - cron: "0 6 * * 1-5" # 13:00 Jakarta, Mon-Fri
    - cron: "0 7 * * 1-5" # 14:00 Jakarta, Mon-Fri
    - cron: "0 8 * * 1-5" # 15:00 Jakarta, Mon-Fri
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Breakout 20 Days Screener
        run: python main.py --strategy breakout_20_days